apiVersion: v1
kind: Service
metadata:
  name: cts-app
spec:
  selector:
    app: cts-app
  type: NodePort
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cts-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cts-app
  template:
    metadata:
      labels:
        app: cts-app
    spec:
      containers:
      - name: cts-app
        image: us.gcr.io/radiant-land-387911/ctsapp:rc1-b3105c1
        imagePullPolicy: Always
        ports:
        - containerPort: 5000